<div class="max-w-2xl mx-auto px-4 py-12">
  <button [routerLink]="['/cliente/detallepedido']" [queryParams]="{ id: idPedido }"
    class="group flex items-center text-sm text-gray-500 hover:text-blue-600 mb-8 transition-all">
    <fa-icon [icon]="faArrowLeft" class="mr-2 group-hover:-translate-x-1 transition-transform"></fa-icon>
    Cancelar y volver
  </button>

  <div
    class="fade-in-up bg-white dark:bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-100 dark:border-gray-700">

    <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 text-white text-center">
      <div class="inline-flex p-4 bg-white/20 rounded-full mb-4 backdrop-blur-md">
        <fa-icon [icon]="faUtensils" class="text-3xl"></fa-icon>
      </div>
      <h1 class="text-2xl font-bold">¿Qué te pareció el plato?</h1>
      <p class="text-blue-100 mt-2 font-medium">{{ nombrePlato() }}</p>
    </div>

    <div class="p-8 md:p-12">
      <div class="flex flex-col items-center mb-10">
        <p class="text-gray-400 uppercase text-xs font-bold tracking-widest mb-4">Tu Calificación</p>
        <div class="flex gap-3">
          @for (star of [1,2,3,4,5]; track star) {
          <fa-icon [icon]="faStar" class="star-rating"
            [class.text-yellow-400]="(hoverCalificacion() || calificacion()) >= star"
            [class.text-gray-200]="(hoverCalificacion() || calificacion()) < star"
            (mouseenter)="hoverCalificacion.set(star)" (mouseleave)="hoverCalificacion.set(0)"
            (click)="setCalificacion(star)">
          </fa-icon>
          }
        </div>
        <p class="mt-4 text-sm font-semibold"
          [ngClass]="{'text-yellow-600': calificacion() > 0, 'text-gray-300': calificacion() === 0}">
          {{ calificacion() === 0 ? 'Toca una estrella' : calificacion() + ' de 5 estrellas' }}
        </p>
      </div>

      <div class="space-y-2 mb-8">
        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300">Cuéntanos más detalles
          (Opcional)</label>
        <textarea [(ngModel)]="comentario" placeholder="¿El sabor fue lo que esperabas? ¿La temperatura era correcta?"
          class="w-full p-4 h-32 bg-gray-50 dark:bg-gray-700 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl transition-all outline-none resize-none text-gray-700 dark:text-white"></textarea>
      </div>

      <button (click)="enviarResena()" [disabled]="calificacion() === 0 || enviando()"
        class="w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 dark:shadow-none transition-all flex items-center justify-center gap-3">
        @if (enviando()) {
        <div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
        Procesando...
        } @else {
        <fa-icon [icon]="faPaperPlane"></fa-icon>
        Publicar Reseña
        }
      </button>
    </div>
  </div>
</div>
